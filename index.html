<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muse — coding font × theme × language</title>
  <link rel="stylesheet" href="./src/style.css">
  <style>
    /* Boot overlay: paints before any external resource arrives */
    #boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 1.125rem;
      letter-spacing: 0.02em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="boot-overlay">Loading highlighter…</div>

  <aside class="sidebar-fonts"></aside>
  <header><h1>Muse</h1><span class="header-quote">Style is the perfection of a point of view. — Richard Eberhart</span></header>
  <nav class="lang-tabs"></nav>
  <main class="preview-pane"></main>
  <aside class="sidebar-themes"></aside>
  <footer class="controls-bar"></footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
